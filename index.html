<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз: Первая мировая война</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 25px;
    color: white;
    text-align: center;
}

.hidden { display: none; }

button {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { transform: scale(1.03); }

.start-btn { background: #27ae60; color: white; }
.next-btn { background: #2980b9; color: white; }
.restart-btn { background: #f39c12; color: white; }

.answer { background: rgba(255,255,255,0.1); color: white; }

.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

.progress {
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #2ecc71;
}

#fact {
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container" id="start-screen">
    <h1>Квиз</h1>
    <p>Первая мировая война</p>
    <button class="start-btn" onclick="startQuiz()">Начать квиз</button>
</div>

<div class="container hidden" id="quiz-screen">
    <div id="counter"></div>

    <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="question"></div>
    <div id="answers"></div>

    <div id="fact" class="hidden"></div>

    <button class="next-btn" onclick="nextQuestion()">Далее</button>

    <div id="result"></div>
    <button class="restart-btn hidden" id="restart-btn" onclick="restartQuiz()">Пройти заново</button>
</div>

<script>

const quiz = [

{ question:"В каком году началась Первая мировая война?", answers:["1912 год ","1914 год","1916 год","1918 год"], correct:1, fact:"28 июля 1914 года началась война." },
{ question:"Что стало поводом к войне?", answers:["Убийство Франца Фердинанда","Кризис","Революция","Конфликт"], correct:0, fact:"Убийство произошло в Сараево." },
{ question:"Какая страна не участвовала?", answers:["Германия","США","Испания","Италия"], correct:2, fact:"Испания оставалась нейтральной." },
{ question:"Сколько лет длилась война?", answers:["2 года ","4 года","6 лет ","10 лет"], correct:1, fact:"С 1914 по 1918 год." },
{ question:"Кто был союзником России?", answers:["Франция","Германия","Турция","Австрия"], correct:0, fact:"Россия входила в Антанту." },
{ question:"Как назывался союз Германии?", answers:["Антанта","Тройственный союз","ООН","НАТО"], correct:1, fact:"Союз Германии и Австро-Венгрии." },
{ question:"В каком году США вступили в войну?", answers:["1915 год","1916 год","1917 год","1918 год"], correct:2, fact:"США мобилизовали более 4 миллионов человек." },
{ question:" Какое новое оружие стали применять?", answers:["Химическое","Ядерное","Лазер","Нет"], correct:0, fact:"Использовали отравляющие газы." },
{ question:"В какой части мира шли бои?", answers:["Европа","Африка","Азия","Америка"], correct:0, fact:"Основные бои — Европа." },
{ question:"Тип войны?", answers:["Траншейная","Морская","Воздушная","Партизанская"], correct:0, fact:"Война велась в окопах." },
{ question:"Кто проиграл в войне?", answers:["Страны Антанты","Центральные державы","Все стороны понесли потери,проигравших не было","Нейтральные страны"], correct:1, fact:"Проиграла Германия и союзники." },
{ question:"Какой мирный договор был подписан в конце войны?", answers:["Версальский","Берлинский","Парижский","Женевский"], correct:0, fact:"Подписан в 1919 году." },
{ question:"Кто вышел из войны?", answers:["Россия","Франция","Англия","США"], correct:0, fact:"После революции 1917 года." },
{ question:"Какая империя распалась?", answers:["Германская","Российская","Османская","Британская"], correct:0, fact:"Германская империя исчезла, установление Веймарской республики." },
{ question:"Итог войны?", answers:["Передел мира","Ничья, заключение мирного договора","Начало Холодной войны","Подписание Мюнхенского соглашения"], correct:0, fact:"Изменились границы стран." },

{ question:"Где впервые массово применили боевые отравляющие вещества?", answers:["У города Ипр","Битва на Марне","Битва при Вердене","На реке Сомме"], correct:0, fact:"В апреле 1915 года немцы выпустили хлор." },
{ question:"Какие страны входили в союз Антанты?", answers:["Россия, Франция, Великобритания","Германия, Австро-Венгрия, Италия","Италия, Испания, Португалия","Болгария, Османская Империя, Германия"], correct:0, fact:"В Антанту входили более 23 государств." },
{ question:"Кто объявил войну России?", answers:["Германия","Турция","Италия","Франция"], correct:0, fact:"Август 1914 года." },
{ question:" Как назывался план Германии?", answers:["Шлиффена","Маршалла","Барбаросса","Версаль"], correct:0, fact:"Быстрая атака на Францию." },
{ question:"Где произошло крупнейшее морское сражение?", answers:["В Северном море","В проливе Ла-Манш","В Средиземном море","У берегов Австралии"], correct:0, fact:"Ютландское сражение 1916 года стало единственным крупным столкновением германского и британского флотов." },
{ question:"Союз стран?", answers:["Антанта","НАТО","ЕС","ООН"], correct:0, fact:"Россия, Франция, Британия." },
{ question:"Какая страна перешла из Тройственного союза на сторону Антанты в 1915 году?", answers:["Италия","Болгария","Румыния","Османская Империя"], correct:0, fact:"Италия рассчитывала получить территории Австро-Венгрии по итогам войны." },
{ question:"Какой русский летчик впервые применил воздушный таран?", answers:["Петр Нестеров","Иван Кожедуб","Валерий Чкалов","Александр Покрышкин"], correct:0, fact:"Это произошло 8 сентября 1914 года, в результате летчик погиб." },
{ question:"Сколько примерно человек было мобилизовано в армиях стран-участниц?", answers:["Более 70 миллионов","Около 60 миллионов","Около 40 миллионов","Более 100 миллионов"], correct:0, fact:"Первая мировая война стала одним из самых масштабных конфликов в истории по числу вовлеченных людей и жертв." },
{ question:"Какой мирный договор был подписан с Россией?", answers:["Брестский","Версальский","Парижский","Берлинский"], correct:0, fact:"1918 год." },
{ question:"Какое было произведено новое оружие?", answers:["Все перечисленные","Танки","Самолёты","Подлодки"], correct:0, fact:"Технологический скачок." },
{ question:"Кто распался по итогам войны?", answers:["Австро-Венгрия","Чехословакия","Югославия","Османская империя"], correct:0, fact:"Империя исчезла." },
{ question:"В каком году закончилась Первая мировая война?", answers:["1918 год ","1917 год","1919 год","1920 год"], correct:0, fact:"11 ноября 1918." },
{ question:"Организация, созданная после окончания войны?", answers:["Лига Наций","ООН","НАТО","ЕС"], correct:0, fact:"Первая мирная организация." },
{ question:"Как назывался первый четырехмоторный бомбардировщик России", answers:["Илья-Муромец","Русский витязь","Гранд","Святогор"], correct:0, fact:"Он мог нести до 800 кг бомб." }

];

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

let current=0;
let score=0;
let answered=false;

function startQuiz(){
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion(){
    answered=false;

    let q=quiz[current];

    document.getElementById("counter").innerText=`Вопрос ${current+1} из ${quiz.length}`;
    document.getElementById("question").innerText=q.question;
    document.getElementById("fact").classList.add("hidden");

    let answers=q.answers.map((a,i)=>({
        text:a,
        correct:i===q.correct
    }));

    shuffle(answers);

    let answersDiv=document.getElementById("answers");
    answersDiv.innerHTML="";

    answers.forEach(a=>{
        let btn=document.createElement("button");
        btn.innerText=a.text;
        btn.classList.add("answer");

        btn.onclick=()=>selectAnswer(btn,a.correct);

        answersDiv.appendChild(btn);
    });

    document.getElementById("progress-bar").style.width=(current/quiz.length)*100+"%";
}

function selectAnswer(button,isCorrect){
    if(answered) return;
    answered=true;

    let buttons=document.querySelectorAll(".answer");

    buttons.forEach(btn=>btn.disabled=true);

    if(isCorrect){
        button.classList.add("correct");
        score++;
        document.getElementById("fact").innerText=quiz[current].fact;
        document.getElementById("fact").classList.remove("hidden");
    } else {
        button.classList.add("wrong");
    }

    buttons.forEach(btn=>{
        if(btn.innerText === quiz[current].answers[quiz[current].correct]){
            btn.classList.add("correct");
        }
    });
}

function nextQuestion(){
    if(!answered){
        alert("Выберите ответ!");
        return;
    }

    current++;

    if(current<quiz.length){
        loadQuestion();
    } else {

        let percent=(score/quiz.length)*100;
        let grade="",text="";

        if(percent>=85){
            grade="Отлично";
            text="Вы отлично знаете тему!";
        } else if(percent>=60){
            grade="Хорошо";
            text="Хороший результат.";
        } else {
            grade="Удовлетворительно";
            text="Стоит повторить материал.";
        }

        document.getElementById("question").innerText="Квиз завершён!";
        document.getElementById("answers").innerHTML="";
        document.getElementById("fact").classList.add("hidden");

        document.getElementById("result").innerHTML=
        `Результат: ${score}/${quiz.length}<br><b>${grade}</b><br>${text}`;

        document.getElementById("restart-btn").classList.remove("hidden");
    }
}

function restartQuiz(){
    current=0;
    score=0;
    answered=false;

    document.getElementById("result").innerText="";
    document.getElementById("restart-btn").classList.add("hidden");

    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("start-screen").classList.remove("hidden");
}

</script>

</body>
</html>
